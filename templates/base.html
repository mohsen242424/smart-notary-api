<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'Amiri';
            /* تأكد أن ملف Amiri-Regular.ttf موجود في مجلد fonts */
            src: url('fonts/Amiri-Regular.ttf') format('truetype');
        }
        body {
            font-family: 'Amiri', serif;
            padding: 1.5cm;
            line-height: 1.8;
            color: #000;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .footer {
            margin-top: 50px;
            text-align: left;
            font-weight: bold;
        }
        .variable {
            border-bottom: 1px dotted #000;
            padding: 0 10px;
            display: inline-block;
            min-width: 100px;
        }
        .national-id-box {
            border: 1px solid #000;
            padding: 2px 5px;
            letter-spacing: 3px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="header">
        <h2>المملكة الأردنية الهاشمية</h2>
        <h3>نظام كاتب العدل الذكي</h3>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        <p>تحريراً في تاريخ: {{ date }}</p>
        <p>التوقيع: ...........................</p>
    </div>
</body>
</html>
